<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ sheet.title }} - 共享曲谱</title>
    <link rel="stylesheet" href="/static/sheets/css/style.css">
</head>
<body class="shared-view">
    <nav class="navbar navbar-shared">
        <div class="container">
            <a href="/" class="logo">🎸 吉他曲谱</a>
            <span class="shared-badge">共享曲谱</span>
        </div>
    </nav>

    <main class="container shared-container">
        <h1>{{ sheet.title }}</h1>
        {% if sheet.category %}
        <p class="sheet-category">分类：{{ sheet.category.name }}</p>
        {% endif %}

        {% if images %}
        <div class="sheet-images-container">
            {% for img in images %}
            <div class="sheet-image-item">
                <img src="{{ img.image.url }}" alt="{{ sheet.title }} - 第{{ forloop.counter }}页" class="sheet-full-image">
                <div class="image-actions">
                    <span class="page-label">第 {{ forloop.counter }} 页</span>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p style="text-align: center; color: #718096;">该曲谱暂无图片</p>
        {% endif %}

        <p class="shared-footer">此曲谱由 <strong>{{ sheet.owner.username }}</strong> 分享</p>
    </main>
</body>
</html>
