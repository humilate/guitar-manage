{% extends 'sheets/base.html' %}

{% block title %}登录 - 吉他曲谱管理系统{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>登录</h2>
        {% if rate_limit_error %}
        <div class="alert alert-error" style="padding: 10px 15px; margin-bottom: 1rem; border-radius: 5px; background: #F5E6E4; color: #5C3230; border: 1px solid #D4A9A5;">
            {{ rate_limit_error }}
        </div>
        {% endif %}
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p class="auth-link">
            还没有账号？<a href="{% url 'register' %}">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}
