{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}吉他曲谱管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'sheets/css/style.css' %}">
    <style>
        .page-loading {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f7fafc;
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }
        .page-loading.active {
            display: flex;
        }
        .page-loading .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .page-loading .loading-text {
            color: #4a5568;
            font-size: 0.95rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="page-loading" id="pageLoading">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <nav class="navbar">
        <div class="container">
            <a href="{% url 'dashboard' %}" class="logo">🎸 吉他曲谱管理</a>
            {% if user.is_authenticated %}
            <div class="nav-links">
                <a href="{% url 'dashboard' %}">我的曲谱</a>
                <a href="{% url 'catalog' %}">目录</a>
                <a href="{% url 'add_sheet' %}">上传曲谱</a>
                <a href="{% url 'upload_folder' %}">批量上传</a>
                <span class="username">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline">退出登录</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="container page-transition">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 吉他曲谱管理系统</p>
        </div>
    </footer>

    {% if messages %}
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var container = document.getElementById('toastContainer');
            {% for message in messages %}
            (function() {
                var toast = document.createElement('div');
                toast.className = 'toast toast-{{ message.tags }}';
                var iconMap = {
                    'success': '✅',
                    'error': '❌',
                    'warning': '⚠️',
                    'info': '️'
                };
                var icon = iconMap['{{ message.tags }}'] || '';
                toast.innerHTML = '<span>' + icon + '</span><span>{{ message|escapejs }}</span>';
                container.appendChild(toast);
                setTimeout(function() {
                    toast.classList.add('toast-hiding');
                    setTimeout(function() { toast.remove(); }, 300);
                }, 3500);
            })();
            {% endfor %}
        });
    </script>
    {% endif %}
</body>
</html>
